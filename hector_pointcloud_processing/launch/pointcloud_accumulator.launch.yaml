launch:
  - arg:
      name: resolution
      default: "0.025"
  - arg:
      name: frame
      default: "map"
  - arg:
      name: publish_rate
      default: "0.2" # Publish every 5s by default
  - arg:
      name: aggregation_mode
      default: "average" # Options: average, highest_z, closest_to_center
  - arg:
      name: topics
      default: '["pointcloud"]'
  - arg:
      name: output_topic
      default: "accumulated_pointcloud"
  - arg:
      name: use_sim_time
      default: "false"

  - node:
      pkg: hector_pointcloud_processing
      exec: pointcloud_accumulator_node
      name: pointcloud_accumulator_node
      output: screen
      respawn: "true"
      param:
        - name: resolution
          value: $(var resolution)
        - name: frame
          value: $(var frame)
        - name: publish_rate
          value: $(var publish_rate)
        - name: aggregation_mode
          value: $(var aggregation_mode)
        - name: topics
          value: $(var topics)
        - name: use_sim_time
          value: $(var use_sim_time)
      remap:
        - from: "accumulated_pointcloud"
          to: "$(var output_topic)"
