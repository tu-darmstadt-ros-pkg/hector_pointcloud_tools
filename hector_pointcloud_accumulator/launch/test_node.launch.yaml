launch:
  - arg:
      name: resolution
      default: "0.025"
  - arg:
      name: frame
      default: "map"
  - arg:
      name: publish_rate
      default: "0.2" # Publish every 5s by default
  - arg:
      name: topics
      default: '["front_lidar_sensor/self_filter/filtered","back_lidar_sensor/self_filter/filtered"]'
  - arg:
      name: out_topic
      default: "accumulated_pointcloud"

  - arg:
      name: "robot_ns"
      default: "athena"
  - push_ros_namespace:
      namespace: "$(var robot_ns)"
  - set_remap:
      from: "/tf"
      to: "tf"
  - set_remap:
      from: "/tf_static"
      to: "tf_static"
  - set_parameter:
      name: "use_sim_time"
      value: "true"

  - node:
      pkg: hector_pointcloud_accumulator
      exec: pointcloud_accumulator_node
      name: pointcloud_accumulator_node
      output: screen
      respawn: "true"
      param:
        - name: resolution
          value: $(var resolution)
        - name: frame
          value: $(var frame)
        - name: publish_rate
          value: $(var publish_rate)
        - name: topics
          value: $(var topics)
      remap:
        - from: "cloud_out"
          to: "$(var out_topic)"
